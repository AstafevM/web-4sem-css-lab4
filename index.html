<!DOCTYPE html>
<html>

<head>
    <title>Fast Food Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="navbar">
        <a class="nav-logo" href="">
            <img src="imgs/hat.png" alt="logo"><span>Foo</span>
        </a>
        <ul class="nav-list">
            <li><a href="">Home</a></li>
            <li><a href="">Menu</a></li>
            <li><a href="">Contact</a></li>
            <li><a href="">Shop</a></li>
        </ul>
        <div class="search-bar">
            <img src="imgs/loupe.png" alt="">
            <input type="text" placeholder="Search">
            <a href="">
                <img src="imgs/cart.png" alt="">
                <span>2</span>
            </a>
        </div>
    </header>

    <section class="content">
        <div class="info">
            <h1 class="title">
                <span class="orange-title">Fast</span>
                <div class="black-title">
                    <span>Food</span>
                    <span>Delivery</span>
                </div>
            </h1>
            <p class="info-text">
                Sed ut perspiciatis unde omnis iste natus sit voluptatem accusantium doloremque laudantium
            </p>
            <div class="actions">
                <button class="order-btn" href="">Order Now</button>
                <a class="watch-btn" href="">
                    <span id="span1">▶</span>
                    <span id="span2">Watch Video</span>
                </a>
            </div>
            <div class="rating">
                <span class="stars">★★★★★</span>
                <span style="font-weight: bold;font-size: 18px;">5 star rating</span>
                <span style="color: gray;font-size: 18px;">based on 1788 reviews</span>
            </div>
        </div>
        <img src="imgs/logo.png" alt="Fast Food Delivery">
    </section>
</body>

</html>
